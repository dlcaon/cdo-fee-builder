<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CDO Fee Builder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --cdo-bg: #0f0f13; --cdo-text: #e8e8f0; --cdo-accent: #6c63ff; --cdo-border: #2a2a35;
  }
  html, body { margin: 0; padding: 0; background: var(--cdo-bg); color: var(--cdo-text); font-family: 'DM Mono', 'Fira Code', 'JetBrains Mono', 'Courier New', monospace; }
  *, *::before, *::after { box-sizing: border-box; }
  #boot {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    background: var(--cdo-bg); color: var(--cdo-accent);
    font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
    transition: opacity 0.35s ease;
  }
  #boot::after {
    content: ''; width: 28px; height: 28px; margin-left: 14px;
    border: 2px solid var(--cdo-border); border-top-color: var(--cdo-accent); border-radius: 50%;
    animation: cdo-spin 0.9s linear infinite;
  }
  @keyframes cdo-spin { to { transform: rotate(360deg); } }
  #boot.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="boot">Loading Fee Builder</div>
<div id="root"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>

/* @page margins are the canonical way to put white space on every PRINTED
 * page (including the 2nd printed page of a multi-page DOM block such as

 * of the DOM block, so overflow continuation pages would render with no
 * margin without this rule. The @bottom-right margin box auto-numbers
 * every printed page using a CSS counter, sidestepping the issue where
 * absolute-positioned manual page numbers anchored against .page can land
 * mid-content if the print engine shrinks .page to its content height. */
@page {
  size: A4;
  margin: 22mm 22mm 24mm;
  @bottom-right {
    content: counter(page);

/* @page handles page size and margins. We use a positioning trick: the
 * .page element is shrink-wrapped to its content (no min-height), but we
 * give it an explicit min-height equal to the printable area so absolute-
 * positioned children (page numbers) anchor at the bottom of the page,
 * not wherever the content happens to end.

 * Some print engines (weasyprint in particular) resolve the bottom prop for

 * shrinks to content unless we lock it. Using both height and min-height

.page {

.page.terms-page { height: auto; }
/* Belt-and-braces: never insert a break after the last page or the back

.page:last-child,
